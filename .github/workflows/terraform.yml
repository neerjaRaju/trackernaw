name: Terraform Plan

on:
  pull_request:
    paths: ['infrastructure/terraform/**']

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: 1.9.0 }
      - run: cd infrastructure/terraform && terraform init -backend=false
      - run: cd infrastructure/terraform && terraform validate
