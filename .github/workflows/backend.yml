name: Backend CI

on:
push:
branches:
- main
paths:
- 'backend/**'

pull_request:
paths:
- 'backend/**'

jobs:
build-test:
runs-on: ubuntu-latest

services:
  postgres:
    image: postgres:16-alpine
    env:
      POSTGRES_USER: fieldforce
      POSTGRES_PASSWORD: fieldforce
      POSTGRES_DB: fieldforce
    ports:
      - 5432:5432
    options: >-
      --health-cmd "pg_isready -U fieldforce"
      --health-interval 10s
      --health-timeout 5s
      --health-retries 5

  redis:
    image: redis:7-alpine
    ports:
      - 6379:6379

env:
  DATABASE_URL: postgresql://fieldforce:fieldforce@localhost:5432/fieldforce
  REDIS_URL: redis://localhost:6379

steps:
  - name: Checkout source
    uses: actions/checkout@v4

  - name: Setup Node.js
    uses: actions/setup-node@v4
    with:
      node-version: 20
      cache: npm
      cache-dependency-path: backend/package-lock.json

  - name: Install dependencies
    run: |
      cd backend
      npm ci

  - name: Generate Prisma Client
    run: |
      cd backend
      npx prisma generate

  - name: Sync database schema
    run: |
      cd backend
      npx prisma db push

  - name: Run tests
    run: |
      cd backend
      npm test --if-present

docker:
needs: build-test
if: github.ref == 'refs/heads/main'
runs-on: ubuntu-latest

steps:
  - name: Checkout source
    uses: actions/checkout@v4

  - name: Setup Docker Buildx
    uses: docker/setup-buildx-action@v3

  - name: Login to Docker Hub
    uses: docker/login-action@v3
    with:
      username: ${{ secrets.DOCKERHUB_USERNAME }}
      password: ${{ secrets.DOCKERHUB_TOKEN }}

  - name: Build and Push Backend Image
    uses: docker/build-push-action@v5
    with:
      context: ./backend
      push: true
      tags: ${{ secrets.DOCKERHUB_USERNAME }}/fieldforce-backend:latest
