name: Backend CI

on:
push:
branches: [main]
paths:
- 'backend/**'

pull_request:
paths:
- 'backend/**'

jobs:
build-test:
runs-on: ubuntu-latest

services:
  postgres:
    image: postgres:16-alpine
    env:
      POSTGRES_USER: fieldforce
      POSTGRES_PASSWORD: fieldforce
      POSTGRES_DB: fieldforce
    ports:
      - 5432:5432
    options: >-
      --health-cmd="pg_isready -U fieldforce"
      --health-interval=10s
      --health-timeout=5s
      --health-retries=5

  redis:
    image: redis:7-alpine
    ports:
      - 6379:6379

env:
  DATABASE_URL: postgresql://fieldforce:fieldforce@localhost:5432/fieldforce
  REDIS_URL: redis://localhost:6379
  NODE_ENV: test

steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Setup Node
    uses: actions/setup-node@v4
    with:
      node-version: 20

  - name: Install dependencies
    working-directory: backend
    run: npm ci

  - name: Generate Prisma Client
    working-directory: backend
    run: npx prisma generate

  - name: Push Prisma Schema
    working-directory: backend
    run: npx prisma db push

  - name: Verify tables
    working-directory: backend
    run: npx prisma db pull

  - name: Run Tests
    working-directory: backend
    run: npm test --if-present

docker:
needs: build-test
if: github.ref == 'refs/heads/main'
runs-on: ubuntu-latest

steps:
  - uses: actions/checkout@v4

  - uses: docker/setup-buildx-action@v3

  - uses: docker/login-action@v3
    with:
      username: ${{ secrets.DOCKERHUB_USERNAME }}
      password: ${{ secrets.DOCKERHUB_TOKEN }}

  - uses: docker/build-push-action@v5
    with:
      context: ./backend
      push: true
      tags: ${{ secrets.DOCKERHUB_USERNAME }}/fieldforce-backend:latest
