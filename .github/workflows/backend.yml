name: Backend CI

# Runs on:
#   - push to main → full pipeline (lint, audit, test, docker-build-push, migrate)
#   - push to any branch → lint, audit, test, docker-build-only (catches Dockerfile breakage)
#   - PR → lint, audit, test, docker-build-only
# Only main-branch pushes actually publish images or touch the prod database.
on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'

# Cancel an in-flight run when a newer commit lands on the same ref.
concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '20'
  WORKDIR: backend

jobs:
  # -----------------------------------------------------------------
  # 1. Lint — fast feedback, runs first.
  # -----------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.WORKDIR }}/package-lock.json
      - name: Install
        working-directory: ${{ env.WORKDIR }}
        run: npm ci --no-audit --no-fund
      - name: Lint
        working-directory: ${{ env.WORKDIR }}
        run: npm run lint --if-present

  # -----------------------------------------------------------------
  # 2. Dependency vulnerability audit — fails on HIGH or CRITICAL.
  # -----------------------------------------------------------------
  audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.WORKDIR }}/package-lock.json
      - name: Install
        working-directory: ${{ env.WORKDIR }}
        run: npm ci --no-audit --no-fund
      - name: Audit production deps (fail on high+)
        working-directory: ${{ env.WORKDIR }}
        run: npm audit --omit=dev --audit-level=high

  # -----------------------------------------------------------------
  # 3. Tests — real Postgres + Redis services, coverage gate.
  # -----------------------------------------------------------------
  test:
    name: Test + coverage
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: fieldforce
          POSTGRES_PASSWORD: fieldforce
          POSTGRES_DB: fieldforce
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U fieldforce"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://fieldforce:fieldforce@localhost:5432/fieldforce
      TEST_DATABASE_URL: postgresql://fieldforce:fieldforce@localhost:5432/fieldforce
      REDIS_URL: redis://localhost:6379
      TEST_REDIS_URL: redis://localhost:6379/15
      JWT_SECRET: ci-jwt-secret-32-chars-minimum-not-prod
      JWT_REFRESH_SECRET: ci-refresh-secret-different-32-chars-x

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.WORKDIR }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.WORKDIR }}
        run: npm ci --no-audit --no-fund

      - name: Generate Prisma client
        working-directory: ${{ env.WORKDIR }}
        run: npx prisma generate

      - name: Apply schema to test DB
        working-directory: ${{ env.WORKDIR }}
        run: npx prisma db push --skip-generate --accept-data-loss

      - name: Run tests with coverage
        working-directory: ${{ env.WORKDIR }}
        run: npm run test:coverage

      - name: Upload coverage as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.run_number }}
          path: ${{ env.WORKDIR }}/coverage/
          retention-days: 14

      - name: Coverage summary
        if: always()
        run: |
          if [ -f ${{ env.WORKDIR }}/coverage/coverage-summary.json ]; then
            echo "## Coverage" >> $GITHUB_STEP_SUMMARY
            node -e "
              const s = require('./${{ env.WORKDIR }}/coverage/coverage-summary.json').total;
              const row = (k) => '| ' + k + ' | ' + s[k].pct + '% |';
              console.log('| Metric | Coverage |\n|---|---|\n' + ['lines','statements','functions','branches'].map(row).join('\n'));
            " >> $GITHUB_STEP_SUMMARY
          fi

  # -----------------------------------------------------------------
  # 4. Docker — runs on EVERY push and PR.
  #    Builds always, pushes only on main pushes. PRs catch Dockerfile
  #    breakage early without polluting the registry.
  # -----------------------------------------------------------------
  docker:
    name: Docker (build${{ github.ref == 'refs/heads/main' && github.event_name == 'push' && ' + push' || ' only' }})
    needs: [lint, audit, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login is needed only when we're about to push. Skip on PRs / non-main
      # so PRs from forks (without secrets) don't fail the job.
      - name: Login to DockerHub
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Tag with :latest, :main, :sha-<commit> when pushing. PRs build with
      # a throwaway :pr-<number> tag for local debugging only.
      - name: Compute tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME && format('{0}/fieldforce-backend', secrets.DOCKERHUB_USERNAME) || 'fieldforce-backend' }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
            type=sha,prefix=sha-,format=long
            type=ref,event=pr,prefix=pr-
            type=ref,event=branch
          labels: |
            org.opencontainers.image.title=fieldforce-backend
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build${{ github.ref == 'refs/heads/main' && github.event_name == 'push' && ' + push' || '' }}
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          # Push only when we're on main AND the trigger was a push (not a PR).
          push: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
          load: ${{ !(github.ref == 'refs/heads/main' && github.event_name == 'push') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image summary
        run: |
          echo "## Docker" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.ref }}" = "refs/heads/main" ] && [ "${{ github.event_name }}" = "push" ]; then
            echo "Built **and pushed**:" >> $GITHUB_STEP_SUMMARY
          else
            echo "Built (not pushed — non-main or PR):" >> $GITHUB_STEP_SUMMARY
          fi
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo '${{ steps.meta.outputs.tags }}' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # -----------------------------------------------------------------
  # 5. Apply pending Prisma migrations against the production DB.
  #    Strictly gated behind the `production` environment so it requires
  #    manual approval if you've configured required reviewers.
  # -----------------------------------------------------------------
  migrate:
    name: Run DB migrations (production)
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.WORKDIR }}/package-lock.json
      - name: Install
        working-directory: ${{ env.WORKDIR }}
        run: npm ci --no-audit --no-fund
      - name: prisma migrate deploy
        working-directory: ${{ env.WORKDIR }}
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: npx prisma migrate deploy
