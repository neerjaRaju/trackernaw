version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fieldforce}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fieldforce}
      POSTGRES_DB: ${POSTGRES_DB:-fieldforce}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports: ["5432:5432"]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports: ["6379:6379"]

  zookeeper:
    image: bitnami/zookeeper:3.9
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes
    ports: ["2181:2181"]

  kafka:
    image: bitnami/kafka:3.7
    environment:
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,EXTERNAL://:9094
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
    depends_on: [zookeeper]
    ports: ["9092:9092", "9094:9094"]

  flink-jobmanager:
    image: flink:1.19-scala_2.12
    command: jobmanager
    environment:
      - FLINK_PROPERTIES=jobmanager.rpc.address: flink-jobmanager
    ports: ["8081:8081"]

  flink-taskmanager:
    image: flink:1.19-scala_2.12
    command: taskmanager
    environment:
      - FLINK_PROPERTIES=jobmanager.rpc.address: flink-jobmanager
    depends_on: [flink-jobmanager]

  backend:
    build: ../../backend
    restart: unless-stopped
    env_file: ../../.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-fieldforce}:${POSTGRES_PASSWORD:-fieldforce}@postgres:5432/${POSTGRES_DB:-fieldforce}
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
    depends_on: [postgres, redis, kafka]
    ports: ["4000:4000"]
    command: sh -c "npx prisma migrate deploy && node src/server.js"

  admin-panel:
    build: ../../admin-panel
    restart: unless-stopped
    depends_on: [backend]
    ports: ["8080:80"]

volumes:
  pgdata:
