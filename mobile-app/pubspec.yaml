name: fieldforce_app
description: Field Force Management mobile app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  dio: ^5.7.0
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  geolocator: ^13.0.1
  google_maps_flutter: ^2.9.0
  image_picker: ^1.1.2
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  workmanager: ^0.5.2
  socket_io_client: ^3.0.2
  shared_preferences: ^2.3.2
  intl: ^0.19.0
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
